<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Финансовый трекер</title>

<link rel="stylesheet" href="style.css">
<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="./index.js"></script>

</head>

<body>

<div class="container">

<header class="top-bar">
<h1>💰 Финансы</h1>
<button id="themeToggle" class="theme-btn">🌙</button>
</header>

<form id="transactionForm" class="form">

<input type="number" id="amount" placeholder="Сумма" min="0.01" step="0.01" required>

<select id="type" required>
<option value="">Тип</option>
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>

<select id="category" required>
<option value="">Категория</option>
<option value="salary">Зарплата</option>
<option value="food">Еда</option>
<option value="transport">Транспорт</option>
<option value="entertainment">Развлечения</option>
<option value="health">Здоровье</option>
<option value="other">Другие</option>
</select>

<input type="date" id="date" required>
<input type="text" id="comment" placeholder="Комментарий">

<button type="submit">Добавить</button>

</form>

<section class="stats">

<div class="card">
<h3>Доходы</h3>
<p id="income">0</p>
</div>

<div class="card">
<h3>Расходы</h3>
<p id="expense">0</p>
</div>

<div class="card">
<h3>Баланс</h3>
<p id="balance">0</p>
</div>

</section>

<section class="controls">

<select id="filterType">
<option value="all">Все</option>
<option value="income">Доходы</option>
<option value="expense">Расходы</option>
</select>

<select id="filterCategory">
<option value="all">Все категории</option>
<option value="salary">Зарплата</option>
<option value="food">Еда</option>
<option value="transport">Транспорт</option>
<option value="entertainment">Развлечения</option>
<option value="health">Здоровье</option>
<option value="other">Другие</option>
</select>

<input type="date" id="filterFrom">
<input type="date" id="filterTo">

<button onclick="applyFilters()">Фильтр</button>
<button onclick="resetFilters()">Сброс</button>
<button onclick="exportCSV()">CSV</button>

</section>

<section class="chart-section">
<h2>Диаграмма</h2>

<div class="chart-box">
<canvas id="financeChart"></canvas>
</div>

<pre id="chart"></pre>
</section>

<section class="table-section">

<table class="responsive-table">

<thead>
<tr>
<th id="dateHeader">Дата ⬇</th>
<th>Тип</th>
<th>Категория</th>
<th>Сумма</th>
<th>Комментарий</th>
<th></th>
</tr>
</thead>

<tbody id="transactionTable"></tbody>

</table>

</section>

</div>

</body>
</html>
