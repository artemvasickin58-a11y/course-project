<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Учёт личных финансов</title>
<link rel="stylesheet" href="style.css">
<script defer src="./index.js"></script>
</head>

<body>

<div class="container">

<h1>💰 Калькулятор личных финансов</h1>

<!-- СТАТИСТИКА -->

<div class="stats">

<div class="card incomeCard">
<h3>Доходы</h3>
<p id="income">0</p>
</div>

<div class="card expenseCard">
<h3>Расходы</h3>
<p id="expense">0</p>
</div>

<div class="card balanceCard">
<h3>Баланс</h3>
<p id="balance">0</p>
</div>

</div>

<!-- ДОБАВЛЕНИЕ ТРАНЗАКЦИИ -->

<h2>Добавить транзакцию</h2>

<form id="transactionForm">

<input type="number" id="amount" placeholder="Сумма" required>

<select id="type">
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>

<select id="category">
<option>Еда</option>
<option>Транспорт</option>
<option>Жильё</option>
<option>Развлечения</option>
<option>Здоровье</option>
<option>Другие</option>
</select>

<input type="date" id="date">

<input type="text" id="comment" placeholder="Комментарий">

<button type="submit">Добавить</button>

</form>

<!-- ФИЛЬТРЫ -->

<h2>Фильтры</h2>

<div class="filters">

<select id="filterCategory">
<option value="all">Все категории</option>
<option>Еда</option>
<option>Транспорт</option>
<option>Жильё</option>
<option>Развлечения</option>
<option>Здоровье</option>
<option>Другие</option>
</select>

<input type="date" id="filterFrom">
<input type="date" id="filterTo">

<button onclick="applyFilters()">Фильтр</button>

<button onclick="exportCSV()">Экспорт CSV</button>

</div>

<!-- ПОИСК -->

<input
type="text"
id="search"
placeholder="Поиск по комментарию"
oninput="searchComment()"
class="search"
/>

<!-- ТАБЛИЦА -->

<h2>Транзакции</h2>

<table>

<thead>
<tr>
<th>Дата</th>
<th>Тип</th>
<th>Категория</th>
<th>Сумма</th>
<th>Комментарий</th>
<th></th>
</tr>
</thead>

<tbody id="transactionTable"></tbody>

</table>

<!-- ТЕКСТОВЫЙ ГРАФИК -->

<h2>Распределение расходов</h2>

<pre id="chart"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
