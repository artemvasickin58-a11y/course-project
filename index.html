<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Калькулятор личных финансов</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="./index.js"></script>

</head>

<body>

<div class="container">

<h1>Финансовый трекер</h1>

<div class="form-card">

<form id="transactionForm">

<input type="number" id="amount" placeholder="Сумма" required>

<select id="type">
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>

<select id="category">
<option value="salary">Зарплата</option>
<option value="food">Еда</option>
<option value="transport">Транспорт</option>
<option value="entertainment">Развлечения</option>
</select>

<input type="date" id="date">

<input type="text" id="comment" placeholder="Комментарий">

<button type="submit">Добавить</button>

</form>

</div>

<div class="filters">

<input type="date" id="filterFrom">
<input type="date" id="filterTo">

<select id="filterType">
<option value="all">Все</option>
<option value="income">Доходы</option>
<option value="expense">Расходы</option>
</select>

<select id="filterCategory">
<option value="all">Все категории</option>
<option value="salary">Зарплата</option>
<option value="food">Еда</option>
<option value="transport">Транспорт</option>
<option value="entertainment">Развлечения</option>
</select>

<button onclick="applyFilters()">Фильтр</button>
<button onclick="resetFilters()">Сброс</button>
<button onclick="exportCSV()">CSV</button>

</div>

<div class="stats">

<div class="card income">
<h3>Доходы</h3>
<p id="income">0</p>
</div>

<div class="card expense">
<h3>Расходы</h3>
<p id="expense">0</p>
</div>

<div class="card balance">
<h3>Баланс</h3>
<p id="balance">0</p>
</div>

</div>

<div class="chart-block">

<h2>Диаграмма доходов и расходов</h2>

<canvas id="financeChart"></canvas>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Дата</th>
<th>Тип</th>
<th>Категория</th>
<th>Сумма</th>
<th>Комментарий</th>
<th></th>
</tr>
</thead>

<tbody id="transactionTable"></tbody>

</table>

</div>

</div>

</body>
</html>
